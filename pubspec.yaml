name: scanpay_benin
description: Application de paiement par QR Code pour le Bénin.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  lucide_icons: ^0.257.0
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  animations: ^2.0.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
